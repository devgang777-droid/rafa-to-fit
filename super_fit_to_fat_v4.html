  loadDone=true;
  document.getElementById('ls').innerText='PRONTO!';
  document.getElementById('pb').style.display='block';
}

let worldGenX=0;

function spawnChunk(fromX){
  const gY=H-90;
  let px=fromX;
  const count=10;
  for(let i=0;i<count;i++){
    px+=130+Math.random()*185;
    const hAbove=45+Math.random()*150;
    const py=gY-hAbove;
    const pw=100+Math.random()*120;
    platforms.push({x:px,y:py,w:pw,h:22,type:'plat',color:['#a0522d','#8d6e63','#6d4c41'][Math.floor(Math.random()*3)]});
    const t=Math.random()<.18?'star':Math.random()<.36?'beer':Math.random()<.18?'broccoli':'burger';
    foods.push({x:px+pw/2-16,y:py-44,active:true,rot:0,bob:Math.random()*Math.PI*2,type:t});
  }
  const chunkW=count*160;
  // Guaranteed distribution: 3 burgers, 2 beers, 1 broccoli, 1 star, 1 random per chunk
  const itemTypes=['burger','burger','burger','beer','beer','broccoli','star','burger'];
  for(let i=0;i<8;i++){
    const t=itemTypes[i];
    const spacing=chunkW/8;
    foods.push({
      x:fromX+20+i*spacing+Math.random()*(spacing*0.6),
      y:gY-52,
      active:true,rot:0,bob:Math.random()*Math.PI*2,type:t
    });
  }
  if(Math.random()<0.38){
    gyms.push({x:fromX+100+Math.random()*(chunkW-200)});
  }
  worldGenX=px+200;
}

function generateMoreWorld(){
  while(worldGenX<player.x+W*3) spawnChunk(worldGenX);
  const cullX=cameraX-W*1.5;
  if(platforms.length>250) platforms=platforms.filter(p=>p.type==='ground'||p.x+p.w>cullX);
  if(foods.length>400) foods=foods.filter(f=>f.x>cullX);
  if(gyms.length>60) gyms=gyms.filter(g=>g.x>cullX);
}

function createWorld(){
  platforms=[];foods=[];clouds=[];gyms=[];
  worldGenX=200;
  const gY=H-90;
  platforms.push({x:-3000,y:gY,w:9999999,h:400,type:'ground'});
  for(let i=0;i<22;i++) clouds.push({x:i*660+Math.random()*300,y:55+Math.random()*200,w:115+Math.random()*135,speed:.17+Math.random()*.32});
  for(let i=0;i<8;i++) spawnChunk(worldGenX);
  // Academia garantida perto do inicio
  gyms.push({x:400+Math.random()*300});
  gyms.push({x:900+Math.random()*300});
}

function setupInput(){
  const bind=(id,key)=>{
    const el=document.getElementById(id);
    const on=e=>{e.preventDefault();inputs[key]=true;el.classList.add('pr');};
    const off=e=>{e.preventDefault();inputs[key]=false;el.classList.remove('pr');};
    el.addEventListener('touchstart',on,{passive:false});el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
  };
  bind('bL','left');bind('bR','right');bind('bJ','jump');
  window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')inputs.left=true;if(e.key==='ArrowRight'||e.key==='d')inputs.right=true;if(e.key===' '||e.key==='ArrowUp'||e.key==='w')inputs.jump=true;});
  window.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')inputs.left=false;if(e.key==='ArrowRight'||e.key==='d')inputs.right=false;if(e.key===' '||e.key==='ArrowUp'||e.key==='w')inputs.jump=false;});
}

function spawnParts(x,y,ems){for(let i=0;i<10;i++){const a=(Math.PI*2/10)*i+Math.random()*.4,sp=3+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,life:1,decay:.026+Math.random()*.02,sz:13+Math.random()*9,em:ems[Math.floor(Math.random()*ems.length)]});}}

function showCombo(n){
  if(n<3)return;
  const el=document.getElementById('cp');
  el.innerText=n>=10?'🔥 x'+n+' INSANO!!':n>=5?'⚡ x'+n+' COMBO!':'x'+n+' Combo!';
  el.style.opacity='1';el.style.fontSize=Math.min(1.5+n*.18,3.8)+'rem';
  clearTimeout(comboTimer);comboTimer=setTimeout(()=>el.style.opacity='0',1300);
}

function update(){
  if(!isPlaying)return;
  gameTime++;
  // Gym fade transition
  if(inGym){ updateGym(); return; }
  const ff=player.fat/100;
  const spd=9*(1-ff*.75),jp=JUMP*(1-ff*.55),grav=GRAVITY+ff*.3;
  if(player.fat>=100){isPlaying=false;document.getElementById('fs').innerText=score;document.getElementById('gos').classList.remove('hidden');return;}
  if(inputs.left){player.vx=-spd;player.facing=-1;}else if(inputs.right){player.vx=spd;player.facing=1;}else player.vx*=.8;
  player.vy+=grav;player.vy=Math.min(player.vy,22);
  if(inputs.jump&&player.grounded&&!jumpConsumed){player.vy=-jp;player.grounded=false;jumpConsumed=true;spawnParts(player.x+player.bW/2,player.y+player.bH,['💨','✨']);}
  if(!inputs.jump)jumpConsumed=false;
  player.x+=player.vx;player.y+=player.vy;
  if(player.x<0)player.x=0;
  if(Math.abs(player.vx)>0.5)player.walkT+=0.15;
  player.grounded=false;
  for(let p of platforms){
    if(player.x+player.bW*.85<p.x||player.x+player.bW*.15>p.x+p.w)continue;
    if(player.y+player.bH>p.y&&player.y<p.y+p.h){
      if(player.vy>=0&&player.y+player.bH-player.vy<=p.y+22){player.y=p.y-player.bH;player.vy=0;player.grounded=true;}
    }
  }
  let ate=false;
  const pcx=player.x+player.bW/2,pcy=player.y+player.bH*.5;
  for(let f of foods){
    if(!f.active)continue;
    f.bob+=.055;f.rot+=.035;
    const fx=f.x+18,fy=f.y+18;
    if(Math.abs(pcx-fx)<player.bW*.6&&Math.abs(pcy-fy)<player.bH*.6){
      f.active=false;ate=true;combo++;
      const pts=f.type==='star'?5:f.type==='beer'?3:f.type==='broccoli'?0:1;
      score+=pts;
      const fAdd=f.type==='star'?3:f.type==='beer'?2:f.type==='broccoli'?-7.5:1.2;
      player.fat=Math.max(0,Math.min(100,player.fat+fAdd));
      // BARRIGA cresce, cabeça não
      player.bW=BASE_W+player.fat*2.8;
      player.bH=BASE_H+player.fat*.55;
      // Ensure minimum size
      player.bW=Math.max(BASE_W,player.bW);
      player.bH=Math.max(BASE_H,player.bH);
      document.getElementById('sd').innerText=score;
      document.getElementById('ff').style.width=player.fat+'%';
      document.getElementById('fp').innerText=Math.floor(player.fat);
      const em=f.type==='beer'?['🍺','💦','⭐']:f.type==='star'?['⭐','✨','🌟']:f.type==='broccoli'?['🥦','💪','✨']:['🍔','💥','✨'];
      spawnParts(fx,fy,em);showCombo(combo);
    }
  }
  if(!ate&&gameTime%100===0)combo=0;
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.28;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
  for(let c of clouds){c.x-=c.speed;if(c.x+c.w<cameraX-100)c.x=cameraX+W+100;}
  // Infinite world generation
  generateMoreWorld();

  generateMoreWorld();

  // GYM BUILDING ENTRY — player touches/jumps on building
  if(!inGym && gymCooldown<=0){
    const gY2=H-90;
    const gymBuildH=90, gymBuildW=80;
    const plCX=player.x+pHitW()/2;
    const plFeet=player.y+pHitH();
    const plTop=player.y;
    for(let g of gyms){
      // Check if player overlaps with building horizontally
      if(plCX < g.x-10 || plCX > g.x+gymBuildW+10) continue;
      // Check if player feet are anywhere near/above the building top
      const gTop=gY2-gymBuildH;
      // Trigger if player feet are within 60px above or 20px below building top
      if(plFeet >= gTop-60 && plFeet <= gTop+20){
        enterGym();
        break;
      }
    }
  }
  if(gymCooldown>0) gymCooldown--;
  cameraX+=(player.x-cameraX-W*.28)*.11;if(cameraX<0)cameraX=0;
}

function drawCloud(x,y,w){ctx.fillStyle='rgba(255,255,255,.88)';ctx.beginPath();ctx.ellipse(x+w*.3,y+w*.17,w*.3,w*.16,0,0,Math.PI*2);ctx.ellipse(x+w*.55,y+w*.11,w*.28,w*.15,0,0,Math.PI*2);ctx.ellipse(x+w*.75,y+w*.17,w*.24,w*.14,0,0,Math.PI*2);ctx.fill();}

function drawBurger(x,y,sz,rot){ctx.save();ctx.translate(x+sz/2,y+sz/2);ctx.rotate(rot);const s=sz*.9;ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.ellipse(0,-s*.14,s*.48,s*.26,0,Math.PI,0);ctx.fill();ctx.fillStyle='#fde68a';ctx.beginPath();ctx.ellipse(-s*.12,-s*.28,s*.08,s*.06,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(s*.07,-s*.3,s*.07,s*.05,-.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4ade80';ctx.fillRect(-s*.4,-s*.04,s*.8,s*.11);ctx.fillStyle='#fbbf24';ctx.fillRect(-s*.38,s*.07,s*.76,s*.08);ctx.fillStyle='#92400e';ctx.fillRect(-s*.38,s*.08,s*.76,s*.14);ctx.fillStyle='#f59e0b';ctx.fillRect(-s*.4,s*.2,s*.8,s*.17);ctx.restore();}

function drawBeer(x,y,sz,rot){ctx.save();ctx.translate(x+sz*.42,y+sz*.58);ctx.rotate(rot);const s=sz*.9;ctx.fillStyle='#1b5e20';ctx.beginPath();ctx.roundRect(-s*.22,-s*.32,s*.44,s*.62,s*.07);ctx.fill();ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.roundRect(-s*.1,-s*.58,s*.2,s*.28,s*.04);ctx.fill();ctx.fillStyle='#c62828';ctx.beginPath();ctx.roundRect(-s*.13,-s*.66,s*.26,s*.11,s*.04);ctx.fill();ctx.fillStyle='rgba(255,255,255,.93)';ctx.beginPath();ctx.roundRect(-s*.19,-s*.14,s*.38,s*.34,s*.04);ctx.fill();ctx.fillStyle='#c62828';ctx.font='bold '+s*.2+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',0,s*.01);ctx.fillStyle='#1b5e20';ctx.font='bold '+s*.13+'px serif';ctx.fillText('H',0,s*.14);ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.roundRect(-s*.19,-s*.32,s*.1,s*.62,s*.04);ctx.fill();ctx.restore();}

function drawBroccoli(x,y,sz,rot){
  ctx.save();
  ctx.translate(x+sz/2, y+sz/2);
  ctx.rotate(rot);
  const s=sz*.85;
  // Stem
  ctx.fillStyle='#7cb342';
  ctx.fillRect(-s*.08, s*.1, s*.16, s*.4);
  // Main floret clusters
  const florets=[[-s*.22,-s*.12,s*.22],[s*.22,-s*.1,s*.2],[0,-s*.28,s*.24],[-s*.1,s*.02,s*.18],[s*.1,0,s*.17]];
  florets.forEach(([fx,fy,fr])=>{
    ctx.fillStyle='#2e7d32';
    ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#43a047';
    ctx.beginPath();ctx.arc(fx-fr*.25,fy-fr*.25,fr*.55,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#66bb6a';
    ctx.beginPath();ctx.arc(fx-fr*.3,fy-fr*.3,fr*.28,0,Math.PI*2);ctx.fill();
  });
  // Shine
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.beginPath();ctx.arc(-s*.05,-s*.2,s*.08,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawStar(x,y,sz){ctx.save();ctx.translate(x+sz/2,y+sz/2);ctx.font=sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#facc15';ctx.shadowBlur=14;ctx.fillStyle='#facc15';ctx.fillText('⭐',0,2);ctx.restore();}

function drawPlayer(p){
  ctx.save();
  const cx=p.x+p.bW/2, baseY=p.y+p.bH;
  ctx.translate(cx,baseY);
  if(p.facing===-1)ctx.scale(-1,1);
  const ff=p.fat/100, walk=Math.sin(p.walkT);

  // PERNAS
  const lW=14+ff*5, lH=26+ff*3, lOff=9+ff*7, lSwing=p.grounded?walk*10:0;
  // perna esquerda
  ctx.save();ctx.translate(-lOff,-lH);ctx.rotate(lSwing*Math.PI/180);
  ctx.fillStyle='#374151';ctx.beginPath();ctx.roundRect(-lW/2,0,lW,lH,5);ctx.fill();
  ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.ellipse(0,lH+3,lW*.9,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(lW*.18,lH+2,lW*.55,5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // perna direita
  ctx.save();ctx.translate(lOff,-lH);ctx.rotate(-lSwing*Math.PI/180);
  ctx.fillStyle='#374151';ctx.beginPath();ctx.roundRect(-lW/2,0,lW,lH,5);ctx.fill();
  ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.ellipse(0,lH+3,lW*.9,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(-lW*.18,lH+2,lW*.55,5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // BARRIGA / TORSO
  const tH=40+ff*24, tW=p.bW*.84, tY=-lH-tH+6;
  ctx.fillStyle='#1e3a8a';
  ctx.beginPath();
  if(ff<0.05){
    ctx.roundRect(-tW/2,tY,tW,tH,8);ctx.fill();
  } else {
    const bulge=tW*.5*ff*0.9;
    ctx.moveTo(-tW/2,tY);ctx.lineTo(tW/2,tY);
    ctx.lineTo(tW/2,tY+tH*.25);
    ctx.quadraticCurveTo(tW/2+bulge,tY+tH*.62,tW/2,tY+tH);
    ctx.lineTo(-tW/2,tY+tH);
    ctx.quadraticCurveTo(-tW/2-bulge,tY+tH*.62,-tW/2,tY+tH*.25);
    ctx.closePath();ctx.fill();
    // umbigo
    if(ff>0.35){ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,tY+tH*.74,5*ff,4*ff,0,0,Math.PI*2);ctx.fill();}
  }
  // gola
  ctx.fillStyle='#2563eb';ctx.beginPath();ctx.roundRect(-tW/2,tY,tW,8,[8,8,0,0]);ctx.fill();

  // BRAÇOS
  const aY=tY+8, aLen=24+ff*6, aW=11+ff*5, aAng=(18+ff*28)*Math.PI/180, aSwing=p.grounded?walk*11:0;
  ctx.strokeStyle='#e8c49a';ctx.lineWidth=aW;ctx.lineCap='round';
  // esquerdo
  ctx.save();ctx.translate(-tW/2,aY);ctx.rotate(aAng+aSwing*Math.PI/180);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,aLen);ctx.stroke();
  ctx.fillStyle='#e8c49a';ctx.beginPath();ctx.arc(0,aLen+aW*.3,aW*.55,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // direito
  ctx.save();ctx.translate(tW/2,aY);ctx.rotate(-aAng-aSwing*Math.PI/180);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,aLen);ctx.stroke();
  ctx.fillStyle='#e8c49a';ctx.beginPath();ctx.arc(0,aLen+aW*.3,aW*.55,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // PESCOÇO
  const nY=tY-11;
  ctx.fillStyle='#e8c49a';ctx.beginPath();ctx.roundRect(-8,nY,16,13,4);ctx.fill();

  // CABEÇA com foto (tamanho FIXO = HEAD_R, nunca muda)
  const hR=HEAD_R, hCY=nY-hR-2;
  if(faceReady){
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
    ctx.beginPath();ctx.arc(0,hCY,hR,0,Math.PI*2);ctx.clip();
    // PNG com fundo transparente: apenas o rosto/boné ficam visíveis
    ctx.drawImage(faceImg,-hR,hCY-hR,hR*2,hR*2);
    ctx.restore();
    ctx.beginPath();ctx.arc(0,hCY,hR,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2;ctx.stroke();
  } else {
    ctx.fillStyle='#e8c49a';ctx.beginPath();ctx.arc(0,hCY,hR,0,Math.PI*2);ctx.fill();
  }

  // Corrente pescoço
  ctx.strokeStyle='rgba(210,175,80,.85)';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,hCY+hR-3,7,0.25,Math.PI-.25);ctx.stroke();

  ctx.restore();
}

function draw(){
  if(inGym){ drawGym(); return; }

  // ── sky ──
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1565c0');sky.addColorStop(.55,'#42a5f5');sky.addColorStop(1,'#b0e0ff');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // ── sun (isolated save/restore, shadow cleared inside) ──
  ctx.save();
  ctx.shadowColor='#fff176'; ctx.shadowBlur=40;
  ctx.fillStyle='#fff9c4';
  ctx.beginPath(); ctx.arc(W*.84,H*.1,46,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  ctx.fillStyle='#fff176';
  ctx.beginPath(); ctx.arc(W*.84,H*.1,32,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── clouds (no shadow) ──
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  for(let c of clouds) drawCloud(c.x-cameraX*.3,c.y,c.w);

  // ── world (translated) ──
  ctx.save();
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  ctx.translate(-cameraX,0);

  // ground + platforms
  for(let p of platforms){
    if(p.x+p.w<cameraX-60||p.x>cameraX+W+60) continue;
    if(p.type==='ground'){
      ctx.fillStyle='#5d4037'; ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='#43a047'; ctx.fillRect(p.x,p.y,p.w,13);
      ctx.fillStyle='#388e3c';
      for(let gx2=p.x;gx2<Math.min(p.x+p.w, cameraX+W+100);gx2+=15){
        ctx.beginPath();ctx.moveTo(gx2,p.y);ctx.lineTo(gx2+3,p.y-7);ctx.lineTo(gx2+6,p.y);ctx.fill();
      }
    } else {
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,8); ctx.fill();
      ctx.fillStyle='#558b2f'; ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,8,[8,8,0,0]); ctx.fill();
    }
  }

  // gym buildings
  const gY3=H-90;
  for(let g of gyms){
    if(g.x+80<cameraX-20||g.x>cameraX+W+20) continue;
    const gx=g.x, bW2=80, bH2=90;
    ctx.fillStyle='#1a237e'; ctx.fillRect(gx,gY3-bH2,bW2,bH2);
    ctx.fillStyle='#283593'; ctx.fillRect(gx,gY3-bH2,bW2,bH2*.5);
    // windows
    [[.14,.15],[.54,.15],[.14,.52],[.54,.52]].forEach(([wx,wy])=>{
      ctx.fillStyle='rgba(255,235,59,.8)';
      ctx.beginPath(); ctx.roundRect(gx+bW2*wx,gY3-bH2+bH2*wy,bW2*.26,bH2*.18,2); ctx.fill();
    });
    // sign
    ctx.fillStyle='#f97316';
    ctx.beginPath(); ctx.roundRect(gx+3,gY3-bH2-30,bW2-6,26,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
    ctx.fillText('ACADEMIA',gx+bW2/2,gY3-bH2-19);
    ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='8px Arial';
    ctx.fillText('PULA AQUI!',gx+bW2/2,gY3-bH2-7);
    // roof
    ctx.fillStyle='#0d47a1'; ctx.fillRect(gx-2,gY3-bH2-4,bW2+4,6);
  }

  // foods (shadow per item, cleared after)
  for(let f of foods){
    if(!f.active||f.x<cameraX-80||f.x>cameraX+W+80) continue;
    const bY=Math.sin(f.bob)*6;
    ctx.save();
    ctx.shadowBlur=12;
    ctx.shadowColor=f.type==='beer'?'#4caf50':f.type==='star'?'#facc15':f.type==='broccoli'?'#66bb6a':'#f97316';
    if(f.type==='beer')      drawBeer(f.x,f.y+bY,40,Math.sin(f.bob)*.1);
    else if(f.type==='star') drawStar(f.x,f.y+bY,40);
    else if(f.type==='broccoli') drawBroccoli(f.x,f.y+bY,40,Math.sin(f.bob)*.08);
    else                     drawBurger(f.x,f.y+bY,40,f.rot);
    ctx.restore();
  }

  // player
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  drawPlayer(player);

  // particles
  for(let p of particles){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.shadowBlur=0;
    ctx.font=p.sz+'px serif'; ctx.textAlign='center';
    ctx.fillText(p.em,p.x,p.y); ctx.restore();
  }

  ctx.restore(); // end world translate

  // fade overlay

}

// ── GYM MAP FUNCTIONS ────────────────────────────────────────────────────────
function enterGym(){
  if(inGym) return;
  gymTime=0; gymCooldown=180;
  gymFading=false; gymFadeAlpha=0; gymFadeIn=false;
  // Spawn carrots and tadalafil in gym
  gymCarrots=[];
  for(let i=0;i<8;i++) gymCarrots.push({x:80+i*120,y:H-160,active:true,bob:i*0.4});
  gymTada={x:W/2, y:H-260, active:true, bob:0, collected:false};
  gymMsg=''; gymMsgTimer=0;
  inGym=true;
  player.x=80; player.y=H-300; player.vx=0; player.vy=0;
}

function exitGym(){
  inGym=false; gymFading=false; gymFadeAlpha=0;
  gymCooldown=120;
  headBonus=Math.min(headBonus+12, 30);
}

function updateGym(){
  gymTime++;
  // Update carrot bobs
  for(let c of gymCarrots) c.bob+=0.07;
  if(gymTada) gymTada.bob+=0.05;

  // Player moves in gym (simplified: only left/right + jump on flat floor)
  const gFloor=H-90;
  const fatF=player.fat/100;
  const spd=8*(1-fatF*.5), jp=15*(1-fatF*.4);

  if(inputs.left){player.vx=-spd;player.facing=-1;}
  else if(inputs.right){player.vx=spd;player.facing=1;}
  else player.vx*=.8;

  player.vy+=0.7; player.vy=Math.min(player.vy,18);
  if(inputs.jump&&player.grounded&&!jumpConsumed){
    player.vy=-jp; player.grounded=false; jumpConsumed=true;
  }
  if(!inputs.jump) jumpConsumed=false;

  player.x+=player.vx; player.y+=player.vy;
  player.x=Math.max(10, player.x); // allow exit right side

  // Floor collision
  player.grounded=false;
  if(player.y+pHitH()>=gFloor){
    player.y=gFloor-pHitH(); player.vy=0; player.grounded=true;
  }
  // Platform in gym (bench)
  const bench={x:W*.35, y:gFloor-80, w:W*.3, h:20};
  if(player.x+pHitW()*.85>bench.x && player.x+pHitW()*.15<bench.x+bench.w &&
     player.y+pHitH()>bench.y && player.y+pHitH()<bench.y+bench.h+20 && player.vy>=0){
    player.y=bench.y-pHitH(); player.vy=0; player.grounded=true;
  }

  if(Math.abs(player.vx)>0.5) player.walkT+=0.14;

  // Eat carrots → slim down (2.5 fat each)
  const pcx2=player.x+pHitW()/2, pcy2=player.y+pHitH()/2;
  for(let c of gymCarrots){
    if(!c.active) continue;
    if(Math.abs(pcx2-(c.x+16))<pHitW()*.6 && Math.abs(pcy2-(c.y+16))<pHitH()*.6){
      c.active=false;
      player.fat=Math.max(0, player.fat-3.5);
      player.bW=Math.max(BASE_W, BASE_W+player.fat*2.8);
      player.bH=Math.max(BASE_H, BASE_H+player.fat*.55);
      document.getElementById('ff').style.width=player.fat+'%';
      document.getElementById('fp').innerText=Math.floor(player.fat);
      spawnParts(c.x+16,c.y+16,['🥕','💪','✨']);
      gymMsg='CENOURA! -3.5% GORDURA'; gymMsgTimer=80;
    }
  }

  // Collect tadalafil
  if(gymTada && gymTada.active){
    if(Math.abs(pcx2-gymTada.x)<50 && Math.abs(pcy2-gymTada.y)<50){
      gymTada.active=false; gymTada.collected=true;
      headBonus=Math.min(headBonus+8, 30);
      score+=10;
      document.getElementById('sd').innerText=score;
      spawnParts(gymTada.x,gymTada.y,['💊','⚡','💪']);
      gymMsg='TADALA! CABEÇA +++ 😂'; gymMsgTimer=100;
    }
  }

  if(gymMsgTimer>0) gymMsgTimer--;

  // Exit gym: player walks off right edge OR presses jump near exit sign
  const nearExit = player.x > W*0.78;
  if(player.x+pHitW() >= W-5 || (nearExit && inputs.jump && player.grounded)){
    exitGym();
  }
}

function drawCarrot(x,y,sz,bob){
  ctx.save(); ctx.translate(x+sz/2, y+sz/2+Math.sin(bob)*5);
  const s=sz*.85;
  // body
  ctx.fillStyle='#f97316';
  ctx.beginPath();
  ctx.moveTo(0,-s*.45); ctx.lineTo(s*.3,s*.45); ctx.lineTo(-s*.3,s*.45);
  ctx.closePath(); ctx.fill();
  // stripes
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5;
  [-s*.15, s*.05, s*.22].forEach(y2=>{
    ctx.beginPath(); ctx.moveTo(-s*.22+Math.abs(y2)*.3,y2); ctx.lineTo(s*.22-Math.abs(y2)*.3,y2); ctx.stroke();
  });
  // leaves
  ctx.fillStyle='#4caf50';
  ctx.beginPath(); ctx.ellipse(-s*.1,-s*.5,s*.08,s*.2,-.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*.1,-s*.5,s*.08,s*.18,.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-s*.55,s*.06,s*.22,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawTada(x,y,bob){
  ctx.save(); ctx.translate(x, y+Math.sin(bob)*6);
  // Pill bottle
  ctx.fillStyle='#e53935';
  ctx.beginPath(); ctx.roundRect(-18,-28,36,42,8); ctx.fill();
  ctx.fillStyle='#ffcdd2';
  ctx.beginPath(); ctx.roundRect(-18,-28,36,12,[8,8,0,0]); ctx.fill();
  // Label
  ctx.fillStyle='white';
  ctx.font='bold 9px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('TADALA',0,0);
  ctx.font='bold 7px Arial'; ctx.fillText('FIL',0,11);
  // Pills inside (visible through bottle)
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(-6,20,4,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,18,4,3,0.3,0,Math.PI*2); ctx.fill();
  // Glow
  ctx.shadowColor='#ef9a9a'; ctx.shadowBlur=12;
  ctx.strokeStyle='#ffcdd2'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(-18,-28,36,42,8); ctx.stroke();
  ctx.restore();
}

function drawGym(){
  // Background: gym interior
  const bgG=ctx.createLinearGradient(0,0,0,H);
  bgG.addColorStop(0,'#1a1a2e'); bgG.addColorStop(1,'#16213e');
  ctx.fillStyle=bgG; ctx.fillRect(0,0,W,H);

  // Ceiling lights
  for(let i=0;i<4;i++){
    const lx=W*.15+i*(W*.24);
    ctx.fillStyle='rgba(255,230,150,.08)';
    ctx.beginPath(); ctx.ellipse(lx,0,60,80,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fffde7';
    ctx.beginPath(); ctx.rect(lx-20,-5,40,8); ctx.fill();
  }

  // Floor
  const floorG=ctx.createLinearGradient(0,H-90,0,H);
  floorG.addColorStop(0,'#212121'); floorG.addColorStop(1,'#111');
  ctx.fillStyle=floorG; ctx.fillRect(0,H-90,W,90);
  // Floor shine
  ctx.fillStyle='rgba(255,255,255,.03)';
  ctx.fillRect(0,H-90,W,3);

  // Mirrors on wall
  [.15,.55].forEach(mx=>{
    ctx.fillStyle='rgba(150,200,255,.06)';
    ctx.beginPath(); ctx.roundRect(W*mx,H*.08,W*.28,H*.55,6); ctx.fill();
    ctx.strokeStyle='rgba(150,200,255,.2)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(W*mx,H*.08,W*.28,H*.55,6); ctx.stroke();
    // Mirror frame
    ctx.fillStyle='#37474f';
    ctx.fillRect(W*mx-2, H*.08-2, W*.28+4, 4);
    ctx.fillRect(W*mx-2, H*.63-2, W*.28+4, 4);
  });

  // Equipment: dumbbells rack
  ctx.fillStyle='#37474f';
  ctx.beginPath(); ctx.roundRect(W*.72,H*.5,W*.22,H*.12,4); ctx.fill();
  [0,1,2].forEach(i=>{
    const rx=W*.75+i*(W*.06), ry=H*.5;
    ctx.fillStyle='#546e7a';
    ctx.beginPath(); ctx.ellipse(rx,ry+H*.04,8,14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#78909c';
    ctx.beginPath(); ctx.rect(rx-3,ry+H*.01,6,H*.06); ctx.fill();
    ctx.fillStyle='#546e7a';
    ctx.beginPath(); ctx.ellipse(rx,ry+H*.07,8,14,0,0,Math.PI*2); ctx.fill();
  });

  // Motivational poster
  ctx.fillStyle='#f97316';
  ctx.beginPath(); ctx.roundRect(W*.03,H*.1,W*.28,H*.18,6); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.font='bold 13px Bangers,Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('DISCIPLINA',W*.17,H*.17);
  ctx.fillText('FOCO',W*.17,H*.23);

  // Bench press platform
  const bench={x:W*.35,y:H-170,w:W*.3,h:20};
  const bG=ctx.createLinearGradient(0,bench.y,0,bench.y+bench.h);
  bG.addColorStop(0,'#5d4037'); bG.addColorStop(1,'#3e2723');
  ctx.fillStyle=bG; ctx.beginPath(); ctx.roundRect(bench.x,bench.y,bench.w,bench.h,6); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.08)';
  ctx.beginPath(); ctx.roundRect(bench.x,bench.y,bench.w,4,[6,6,0,0]); ctx.fill();

  // GYM EXIT door on right wall
  ctx.fillStyle='#4a2800';
  ctx.fillRect(W-55, H-180, 50, 90);
  ctx.fillStyle='#f97316';
  ctx.fillRect(W-52, H-177, 44, 84);
  // Door handle
  ctx.fillStyle='#ffd700';
  ctx.beginPath(); ctx.arc(W-18, H-135, 5, 0, Math.PI*2); ctx.fill();
  // Arrow sign above door
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.beginPath(); ctx.roundRect(W-70,H-210,65,28,6); ctx.fill();
  ctx.fillStyle='#f97316'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
  ctx.fillText('SAÍDA →', W-37, H-193);
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='10px Arial';
  ctx.fillText('anda até aqui', W-37, H-180);

  // Draw carrots
  for(let c of gymCarrots){
    if(!c.active) continue;
    ctx.save();
    ctx.shadowColor='#f97316'; ctx.shadowBlur=10;
    drawCarrot(c.x,c.y,36,c.bob);
    ctx.restore();
  }

  // Draw tadalafil
  if(gymTada && gymTada.active){
    ctx.save();
    drawTada(gymTada.x, gymTada.y, gymTada.bob);
    ctx.restore();
  }

  // Draw player
  drawPlayer(player);

  // Particles
  for(let p2 of particles){
    ctx.save(); ctx.globalAlpha=Math.max(0,p2.life);
    ctx.font=p2.sz+'px serif'; ctx.textAlign='center';
    ctx.fillText(p2.em,p2.x,p2.y); ctx.restore();
  }

  // Gym message
  if(gymMsgTimer>0){
    const alpha=Math.min(1,gymMsgTimer/20);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.font='bold 22px Bangers,Arial'; ctx.textAlign='center';
    ctx.fillStyle='#f97316';
    ctx.fillStyle='rgba(0,0,0,.6)';
    ctx.beginPath(); ctx.roundRect(W/2-140,H*.12,280,40,10); ctx.fill();
    ctx.fillStyle='#f97316';
    ctx.fillText(gymMsg, W/2, H*.135);
    ctx.restore();
  }

  // Instructions
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.font='12px Arial'; ctx.textAlign='center';
  ctx.fillText('🥕 Come cenouras para emagrecer  |  💊 Pega o Tadala  |  → Sai pela direita', W/2, H*.96);
}



function initGame(){
  resize();createWorld();setupInput();
  player.x=100;player.y=H-300;player.vx=0;player.vy=0;
  player.fat=0;player.bW=BASE_W;player.bH=BASE_H;player.facing=1;player.walkT=0;
  score=0;combo=0;cameraX=0;gameTime=0;jumpConsumed=false;
  inGym=false;gymFadeAlpha=0;gymFading=false;headBonus=0;gymCooldown=0;worldGenX=200;
  gyms=[{x:350},{x:700},{x:1100}]; // guaranteed gyms near start
  document.getElementById('ss').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('ctrl').classList.remove('hidden');
  document.getElementById('sd').innerText='0';
  document.getElementById('ff').style.width='0%';
  document.getElementById('fp').innerText='0';
  isPlaying=true;requestAnimationFrame(loop);
}
function loop(){update();draw();requestAnimationFrame(loop);}
resize();
</script></body></html>
